<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="galaxy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="64" height="64" rx="14" fill="#0f0a1e"/>

  <!-- 螺旋星系核心光晕 -->
  <circle cx="32" cy="32" r="16" fill="url(#core)"/>

  <!-- 螺旋臂 -->
  <g filter="url(#glow)" fill="none" stroke-linecap="round">
    <path d="M32,32 Q44,24 50,32 Q44,40 32,32 Q20,40 14,32 Q20,24 32,32" stroke="url(#galaxy)" stroke-width="2.5" opacity="0.8"/>
    <path d="M32,32 Q40,20 48,22 Q50,30 42,36" stroke="url(#galaxy)" stroke-width="2" opacity="0.6"/>
    <path d="M32,32 Q24,44 16,42 Q14,34 22,28" stroke="url(#galaxy)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- 星星 -->
  <g fill="#fff">
    <circle cx="48" cy="16" r="1.5" opacity="0.9"/>
    <circle cx="16" cy="18" r="1" opacity="0.7"/>
    <circle cx="50" cy="48" r="1.2" opacity="0.8"/>
    <circle cx="14" cy="50" r="1.5" opacity="0.9"/>
    <circle cx="44" cy="52" r="0.8" opacity="0.6"/>
    <circle cx="20" cy="14" r="0.8" opacity="0.5"/>
    <circle cx="54" cy="30" r="1" opacity="0.7"/>
    <circle cx="10" cy="34" r="0.8" opacity="0.5"/>
  </g>

  <!-- 中心亮星 -->
  <circle cx="32" cy="32" r="3" fill="#fff" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="1.5" fill="#fef3c7"/>
</svg>
