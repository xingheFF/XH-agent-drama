<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title>Seedance 2.0 Skill OS</title>
  <desc>Editorial masthead on warm black: a high-contrast serif Seedance 2.0 wordmark above a calligraphic script Skill OS line, separated from the tagline by a fine rule and a single amber lozenge, with a monospace eyebrow kicker, a 21:9 viewfinder frame, timecode, and film sprocket and waveform details.</desc>
