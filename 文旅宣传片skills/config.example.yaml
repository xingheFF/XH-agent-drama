# ====================================================================
# 文旅剧情宣传片提示词工坊 —— 全局配置
# 复制为 config.yaml 并按需修改
# ====================================================================

# --------------------------------------------------------------------
# LLM 配置（适配层兼容 OpenAI 接口，可接 DeepSeek / 通义 / GPT 等）
# --------------------------------------------------------------------
llm:
  # API 端点（OpenAI 兼容）
  base_url: "https://api.deepseek.com/v1"
  # API Key（也可通过环境变量 LLM_API_KEY 注入）
  api_key: "${LLM_API_KEY}"
  # 默认模型
  model: "deepseek-chat"
  # 结构化输出方式：function_calling | json_mode
  structured_output: "function_calling"
  # 请求超时（秒）
  timeout: 120
  # 最大重试次数
  max_retries: 3
  # 重试退避基数（秒），实际等待 = base * 2^attempt
  retry_backoff_base: 2.0

  # 各角色温度（创作性任务温度高，结构化任务温度低）
  role_temperature:
    director: 0.7        # 提炼，需要一定发散
    screenwriter: 0.85   # 编剧，创造力最高
    storyboard: 0.6      # 分镜，偏向稳定描述
    videographer: 0.5    # 视频师，偏向严谨选型

  # 各角色最大输出 token
  role_max_tokens:
    director: 2000
    screenwriter: 4000
    storyboard: 6000
    videographer: 4000


# --------------------------------------------------------------------
# 项目默认参数（用户未显式指定时使用）
# --------------------------------------------------------------------
defaults:
  target_duration: 90          # 目标时长（秒）
  duration_tolerance: 0.10     # 时长容差 ±10%
  aspect_ratio: "9:16"         # 默认竖屏：9:16 / 16:9 / 1:1
  resolution: "1080x1920"      # 默认分辨率
  fps: 30                      # 默认帧率
  visual_style: "胶片质感,暖黄调,逆光,电影感"   # 默认视觉风格词
  tone: "克制、留白、诗意"     # 默认基调
  voiceover_speed: 3.5         # 旁白语速（中文字/秒）
  subtitle_lang: "zh-CN"       # 字幕语言
  prompt_lang: "en"            # 画面/视频提示词语言（英文模型效果更好）
  desc_lang: "zh-CN"           # 给用户看的中文描述语言


# --------------------------------------------------------------------
# 分镜参数
# --------------------------------------------------------------------
shot:
  # 单镜头时长区间（秒）
  min_duration: 2
  max_duration: 6
  # 默认镜头类型分布权重（编剧参考）
  shot_type_weights:
    大全景: 0.15
    全景: 0.20
    中景: 0.25
    近景: 0.20
    特写: 0.20
  # 每场景镜头数区间
  shots_per_scene_min: 2
  shots_per_scene_max: 5


# --------------------------------------------------------------------
# 视频生成模型能力表（视频师选型依据）
# 每个模型标注其擅长领域，视频师按镜头 motion_type 匹配
# --------------------------------------------------------------------
video_models:
  kling_v1_5:
    name: "Kling v1.5"
    api_hint: "即梦/可灵"
    strengths: ["camera_movement", "environment_atmosphere", "long_take"]
    weaknesses: ["复杂多体运动", "手指细节"]
    max_duration: 10
    cost_tier: 2
    priority: 1                  # 同类能力中优先级
  runway_gen3:
    name: "Runway Gen-3 Alpha"
    api_hint: "RunwayML"
    strengths: ["character_action", "stylized", "portrait_motion"]
    weaknesses: ["长镜头运镜稳定性"]
    max_duration: 10
    cost_tier: 3
    priority: 2
  pika_v1:
    name: "Pika v1.0"
    api_hint: "Pika Labs"
    strengths: ["stylized", "short_loop", "特效转场"]
    weaknesses: ["写实人物", "长时长"]
    max_duration: 3
    cost_tier: 1
    priority: 3
  svd_v1_1:
    name: "Stable Video Diffusion 1.1"
    api_hint: "本地/ComfyUI"
    strengths: ["environment_atmosphere", "still_ken_burns"]
    weaknesses: ["人物动作", "无明确镜头控制"]
    max_duration: 4
    cost_tier: 0
    priority: 4


# --------------------------------------------------------------------
# 运动类型分类（分镜师/视频师共用）
# --------------------------------------------------------------------
motion_types:
  - camera_movement         # 镜头运动为主：推拉摇移升降
  - character_action        # 人物动作为主：走、跑、转身
  - environment_atmosphere  # 环境氛围为主：雾气、水波、光影
  - still_ken_burns         # 静态图缓慢推拉（兜底方案）


# --------------------------------------------------------------------
# 转场类型（编剧/分镜师共用）
# --------------------------------------------------------------------
transitions:
  - cut            # 硬切
  - crossfade      # 交叉淡入
  - wipe           # 擦除
  - dissolve       # 溶解
  - whip_pan       # 快速摇移转场
  - match_cut      # 相似物剪辑


# --------------------------------------------------------------------
# 输出层参数
# --------------------------------------------------------------------
output:
  # 输出目录（项目相对路径会被解析为绝对）
  dir: "output"
  # 是否同时写 human_readable.md
  write_markdown: true
  # 是否同时写 prompts_only.txt（只抽提示词，便于批量粘贴）
  write_prompts_only: true
  # 是否同时写 shot_table.csv（镜头表）
  write_shot_table: true
  # 是否写 final_package.json（全量合并）
  write_final_package: true
  # 是否写各阶段独立 json
  write_stage_json: true


# --------------------------------------------------------------------
# 输入识别参数
# --------------------------------------------------------------------
input:
  # 完整脚本判定：文件长度超过此字符数且含分场标记，视为完整剧本
  full_script_min_chars: 500
  full_script_markers: ["场景", "分镜", "FADE", "CUT", "内景", "外景", "INT.", "EXT."]
  # 灵感描述判定：字符数低于 full_script_min_chars 视为灵感
  inspiration_max_chars: 800
  # 素材包判定：目录含以下后缀文件
  asset_extensions: [".jpg", ".jpeg", ".png", ".mp4", ".mov", ".wav", ".mp3"]


# --------------------------------------------------------------------
# 视觉一致性锚点配置
# --------------------------------------------------------------------
visual_anchors:
  # 是否强制每个核心角色都有 anchor（分镜师必建）
  enforce_character_anchors: true
  # 是否强制每个核心场景都有 anchor
  enforce_location_anchors: true
  # 一致性提醒词模板（会拼到 image_prompt 里）
  consistency_tag_template: "same {kind}, consistent {feature}, {anchor_ref}"
  # 负向提示词模板
  negative_consistency_template: "inconsistent {feature}, different {kind}, style drift"


# --------------------------------------------------------------------
# 字幕样式参数（供合成阶段参考，本工坊只输出样式描述）
# --------------------------------------------------------------------
subtitle:
  font_family: "Source Han Sans CN"   # 思源黑体
  font_size_ratio: 0.045              # 字号占画面高度比例
  position: "bottom"                  # top / center / bottom
  margin_ratio: 0.08                  # 上下边距占画面比例
  stroke_width: 2                     # 描边宽度
  stroke_color: "black"
  fill_color: "white"
  max_chars_per_line: 16              # 单行最大字符数（竖屏）
  max_lines: 2                        # 最大行数


# --------------------------------------------------------------------
# 旁白/配音参数
# --------------------------------------------------------------------
voiceover:
  # 默认音色描述（供 TTS 选型，本工坊只输出建议）
  default_voice: "中年男声,沉稳,略带沙哑,慢语速"
  # 语速档位（供编剧匹配镜头时长）
  speed_presets:
    slow: 3.0        # 字/秒
    normal: 3.5
    fast: 4.5
  # 情绪-语速映射
  emotion_speed_map:
    平静: "slow"
    叙述: "normal"
    激昂: "fast"
    温暖: "slow"
    怅惘: "slow"


# --------------------------------------------------------------------
# 质检参数（pipeline 末尾自检）
# --------------------------------------------------------------------
quality_check:
  # 时长检查：实际总时长 vs 目标时长
  check_duration: true
  # 旁白字数检查：字数 / 语速 是否匹配镜头时长
  check_voiceover_length: true
  voiceover_tolerance: 0.20     # ±20%
  # 视觉锚点完整性检查
  check_anchors: true
  # 镜头数检查
  check_shot_count: true
  min_shots: 5
  # 情绪曲线完整性（起承转合是否都有对应情绪标记）
  check_emotional_arc: true


# --------------------------------------------------------------------
# 日志与调试
# --------------------------------------------------------------------
logging:
  level: "INFO"                  # DEBUG / INFO / WARNING / ERROR
  # 是否把每个角色的完整 LLM 请求/响应落盘到 output/{proj}/_debug/
  dump_llm_io: true
  # 是否用 rich 美化控制台输出
  rich_console: true
